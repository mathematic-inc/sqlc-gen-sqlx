services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: sqlc
      POSTGRES_PASSWORD: sqlc
      POSTGRES_DB: sqlc_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqlc"]
      interval: 5s
      timeout: 5s
      retries: 5
